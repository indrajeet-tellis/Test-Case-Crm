services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-crm_db}?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://tests.salonnz.com
      - AUTH_TRUST_HOST=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.testcasecrm.rule=Host(`tests.salonnz.com`)"
      - "traefik.http.routers.testcasecrm.entrypoints=websecure"
      - "traefik.http.routers.testcasecrm.tls.certresolver=letsencrypt"
      - "traefik.http.services.testcasecrm.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
      - default
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dokploy-network:
    external: true
  default:

volumes:
  postgres_data:
